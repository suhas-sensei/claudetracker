<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Usage Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .app {
            width: 100%;
            max-width: 420px;
            padding: 1.25rem 1rem 6rem;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 1rem 0 1.5rem;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .header .live {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.25rem;
        }
        .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Period tabs — sticky pill bar */
        .period-bar {
            display: flex;
            gap: 0.35rem;
            padding: 0.25rem;
            background: #141414;
            border-radius: 12px;
            margin-bottom: 1.25rem;
        }
        .period-tab {
            flex: 1;
            padding: 0.45rem 0;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s;
        }
        .period-tab.active {
            background: #1f1f1f;
            color: #fff;
            font-weight: 600;
        }

        /* Stats row — 2x2 grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
        }
        .stat-card {
            background: #141414;
            border-radius: 14px;
            padding: 1rem;
        }
        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }
        .stat-card .label {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-top: 0.35rem;
        }

        /* Member cards */
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.6rem;
            padding-left: 0.25rem;
        }
        .members {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .member-card {
            background: #141414;
            border-radius: 14px;
            padding: 1rem;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .member-card.active {
            border-color: #4ade80;
        }
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .member-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
        }
        .member-status {
            font-size: 0.6rem;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .member-status.online {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
        }
        .member-status.offline {
            background: rgba(100, 100, 100, 0.12);
            color: #555;
        }
        .member-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
        }
        .member-stat {
            text-align: center;
        }
        .member-stat .num {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
        }
        .member-stat .lbl {
            font-size: 0.6rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-top: 0.1rem;
        }

        /* Usage bars */
        .usage-section {
            margin-bottom: 1.5rem;
        }
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .bar-label {
            width: 70px;
            font-size: 0.75rem;
            text-align: right;
            color: #777;
            font-weight: 500;
        }
        .bar-track {
            flex: 1;
            height: 24px;
            background: #141414;
            border-radius: 8px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
            min-width: fit-content;
        }
        .colors-0 { background: linear-gradient(90deg, #d4a574, #c4956a); }
        .colors-1 { background: linear-gradient(90deg, #7c9deb, #6b8dd4); }
        .colors-2 { background: linear-gradient(90deg, #4ade80, #3bcc70); }
        .colors-3 { background: linear-gradient(90deg, #f472b6, #e060a0); }

        /* Activity feed */
        .activity {
            margin-bottom: 1.5rem;
        }
        .activity-list {
            background: #141414;
            border-radius: 14px;
            overflow: hidden;
        }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.78rem;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-time {
            color: #444;
            white-space: nowrap;
            font-size: 0.68rem;
            font-family: monospace;
            min-width: 55px;
        }
        .activity-text { color: #888; }
        .activity-name { color: #ddd; font-weight: 600; }

        /* Install box */
        .install-box {
            background: #141414;
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1.25rem;
        }
        .install-box h2 {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .install-box code {
            display: block;
            background: #0a0a0a;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #d4a574;
            cursor: pointer;
            user-select: all;
            word-break: break-all;
        }
        .install-box .hint {
            font-size: 0.6rem;
            color: #444;
            margin-top: 0.4rem;
        }

        /* Rename modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #141414;
            border-radius: 16px 16px 0 0;
            padding: 1.5rem;
            width: 100%;
            max-width: 420px;
        }
        .modal h3 {
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1rem;
        }
        .modal input {
            width: 100%;
            padding: 0.65rem 0.75rem;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
        }
        .modal input:focus { border-color: #d4a574; }
        .modal-btns { display: flex; gap: 0.5rem; }
        .modal-btns button {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-cancel { background: #1f1f1f; color: #888; }
        .btn-save { background: #d4a574; color: #000; }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Claude Usage Tracker</h1>
            <p class="live"><span class="live-dot"></span>Live updates</p>
        </div>

        <div class="period-bar">
            <button class="period-tab active" data-period="today">Today</button>
            <button class="period-tab" data-period="week">Week</button>
            <button class="period-tab" data-period="month">Month</button>
            <button class="period-tab" data-period="all">All</button>
        </div>

        <div class="stats" id="statsGrid"></div>

        <div class="section-title">Members</div>
        <div class="members" id="membersGrid"></div>

        <div class="usage-section">
            <div class="section-title">Usage Comparison</div>
            <div class="bar-chart" id="barChart"></div>
        </div>

        <div class="activity">
            <div class="section-title">Recent Activity</div>
            <div class="activity-list" id="activityFeed"></div>
        </div>

        <div class="install-box">
            <h2>Install on a friend's machine</h2>
            <code id="installCmd">curl -s http://YOUR_SERVER:5000/install | bash</code>
            <p class="hint">Tap to copy. They run this once.</p>
        </div>
    </div>

    <!-- Rename modal -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <h3>Rename Member</h3>
            <input type="text" id="renameInput" placeholder="Friendly name...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeRename()">Cancel</button>
                <button class="btn-save" onclick="saveRename()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentData = { members: {}, sessions: [], messages: [] };
        let currentPeriod = "today";
        let renameHostname = null;

        const installCmd = document.getElementById("installCmd");
        installCmd.textContent = `curl -s ${window.location.origin}/install | bash`;
        installCmd.addEventListener("click", () => {
            navigator.clipboard.writeText(installCmd.textContent);
            installCmd.style.color = "#4ade80";
            setTimeout(() => installCmd.style.color = "#d4a574", 1000);
        });

        document.querySelectorAll(".period-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelector(".period-tab.active").classList.remove("active");
                tab.classList.add("active");
                currentPeriod = tab.dataset.period;
                render();
            });
        });

        function getAlias(hostname) {
            return currentData.members[hostname]?.alias || hostname;
        }

        function isActive(hostname) {
            return currentData.sessions.some(s => s.hostname === hostname && s.end === null);
        }

        function filterByPeriod(items, dateKey, period) {
            const now = new Date();
            return items.filter(item => {
                if (period === "all") return true;
                const d = new Date(item[dateKey]);
                if (period === "today") return d.toDateString() === now.toDateString();
                if (period === "week") {
                    const weekAgo = new Date(now);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    return d >= weekAgo;
                }
                if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });
        }

        function filterSessions(period) {
            return filterByPeriod(currentData.sessions, "start", period);
        }

        function filterMessages(period) {
            return filterByPeriod(currentData.messages || [], "time", period);
        }

        function sessionMinutes(session) {
            const start = new Date(session.start);
            const end = session.end ? new Date(session.end) : new Date();
            return Math.max(1, Math.round((end - start) / 60000));
        }

        function formatDuration(mins) {
            if (mins < 60) return `${mins}m`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return "now";
            if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}h`;
            return d.toLocaleDateString();
        }

        function render() {
            const hostnames = Object.keys(currentData.members);
            const sessions = filterSessions(currentPeriod);
            const messages = filterMessages(currentPeriod);
            const totalSessions = sessions.length;
            const totalMessages = messages.length;
            const totalMins = sessions.reduce((sum, s) => sum + sessionMinutes(s), 0);
            const activeCount = hostnames.filter(h => isActive(h)).length;

            document.getElementById("statsGrid").innerHTML = `
                <div class="stat-card">
                    <div class="value">${totalMessages}</div>
                    <div class="label">Messages</div>
                </div>
                <div class="stat-card">
                    <div class="value">${totalSessions}</div>
                    <div class="label">Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="value">${formatDuration(totalMins)}</div>
                    <div class="label">Total Time</div>
                </div>
                <div class="stat-card">
                    <div class="value">${activeCount}</div>
                    <div class="label">Active Now</div>
                </div>
            `;

            if (hostnames.length === 0) {
                document.getElementById("membersGrid").innerHTML = `
                    <div class="empty-state">No members yet. Share the install command below.</div>
                `;
            } else {
                document.getElementById("membersGrid").innerHTML = hostnames.map(h => {
                    const active = isActive(h);
                    const memberSessions = sessions.filter(s => s.hostname === h);
                    const memberMessages = messages.filter(m => m.hostname === h);
                    const memberMins = memberSessions.reduce((sum, s) => sum + sessionMinutes(s), 0);
                    return `
                        <div class="member-card ${active ? 'active' : ''}">
                            <div class="member-header">
                                <span class="member-name" onclick="openRename('${h}')">${getAlias(h)}</span>
                                <span class="member-status ${active ? 'online' : 'offline'}">${active ? 'Active' : 'Offline'}</span>
                            </div>
                            <div class="member-stats">
                                <div class="member-stat">
                                    <div class="num">${memberMessages.length}</div>
                                    <div class="lbl">Messages</div>
                                </div>
                                <div class="member-stat">
                                    <div class="num">${memberSessions.length}</div>
                                    <div class="lbl">Sessions</div>
                                </div>
                                <div class="member-stat">
                                    <div class="num">${formatDuration(memberMins)}</div>
                                    <div class="lbl">Time</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join("");
            }

            const maxMsgs = Math.max(1, ...hostnames.map(h =>
                messages.filter(m => m.hostname === h).length
            ));

            document.getElementById("barChart").innerHTML = hostnames.map((h, i) => {
                const count = messages.filter(m => m.hostname === h).length;
                const pct = Math.max(2, (count / maxMsgs) * 100);
                return `
                    <div class="bar-row">
                        <div class="bar-label">${getAlias(h)}</div>
                        <div class="bar-track">
                            <div class="bar-fill colors-${i % 4}" style="width:${pct}%">${count} msgs</div>
                        </div>
                    </div>
                `;
            }).join("");

            const allEvents = [
                ...currentData.sessions.map(s => ({
                    hostname: s.hostname,
                    time: s.end || s.start,
                    text: s.end ? `session (${formatDuration(sessionMinutes(s))})` : `started session`
                })),
                ...(currentData.messages || []).map(m => ({
                    hostname: m.hostname,
                    time: m.time,
                    text: `message`
                }))
            ].sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 20);

            if (allEvents.length === 0) {
                document.getElementById("activityFeed").innerHTML = `
                    <div class="empty-state">No activity yet.</div>
                `;
            } else {
                document.getElementById("activityFeed").innerHTML = allEvents.map(e => `
                    <div class="activity-item">
                        <span class="activity-time">${formatTime(e.time)}</span>
                        <span class="activity-text"><span class="activity-name">${getAlias(e.hostname)}</span> ${e.text}</span>
                    </div>
                `).join("");
            }
        }

        function openRename(hostname) {
            renameHostname = hostname;
            document.getElementById("renameInput").value = getAlias(hostname);
            document.getElementById("renameModal").classList.add("show");
            document.getElementById("renameInput").focus();
        }

        function closeRename() {
            document.getElementById("renameModal").classList.remove("show");
            renameHostname = null;
        }

        async function saveRename() {
            const alias = document.getElementById("renameInput").value.trim();
            if (!alias || !renameHostname) return;
            await fetch("/api/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ hostname: renameHostname, alias }),
            });
            closeRename();
            fetchData();
        }

        document.getElementById("renameInput").addEventListener("keydown", e => {
            if (e.key === "Enter") saveRename();
            if (e.key === "Escape") closeRename();
        });

        async function fetchData() {
            try {
                const res = await fetch("/api/data");
                currentData = await res.json();
                render();
            } catch (e) {}
        }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
