<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Usage Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Stats grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-top: 0.25rem;
        }

        /* Members section */
        .members {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .member-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
            position: relative;
        }
        .member-card.active {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.1);
        }
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .member-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }
        .member-name:hover { color: #d4a574; }
        .member-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-weight: 500;
        }
        .member-status.online {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }
        .member-status.offline {
            background: rgba(136, 136, 136, 0.15);
            color: #888;
        }
        .member-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
        }
        .member-stat .num {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
        }
        .member-stat .lbl {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        /* Usage bars */
        .usage-section {
            margin-bottom: 2rem;
        }
        .usage-section h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #ccc;
        }
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .bar-label {
            width: 100px;
            font-size: 0.85rem;
            text-align: right;
            color: #aaa;
        }
        .bar-track {
            flex: 1;
            height: 28px;
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            min-width: fit-content;
        }
        .colors-0 { background: linear-gradient(90deg, #d4a574, #c4956a); }
        .colors-1 { background: linear-gradient(90deg, #7c9deb, #6b8dd4); }
        .colors-2 { background: linear-gradient(90deg, #4ade80, #3bcc70); }
        .colors-3 { background: linear-gradient(90deg, #f472b6, #e060a0); }

        /* Activity feed */
        .activity {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
        }
        .activity h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #ccc;
        }
        .activity-item {
            display: flex;
            gap: 1rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-time {
            color: #666;
            white-space: nowrap;
            font-family: monospace;
        }
        .activity-text { color: #bbb; }
        .activity-name { color: #fff; font-weight: 600; }

        /* Rename modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            width: 320px;
        }
        .modal h3 { margin-bottom: 1rem; color: #fff; }
        .modal input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .modal-btns { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal-btns button {
            padding: 0.4rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-cancel { background: #333; color: #ccc; }
        .btn-save { background: #d4a574; color: #000; font-weight: 600; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #555;
        }
        .install-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }
        .install-box h2 { font-size: 1rem; color: #ccc; margin-bottom: 0.75rem; }
        .install-box code {
            display: block;
            background: #0f0f0f;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #d4a574;
            cursor: pointer;
            user-select: all;
        }
        .install-box .hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
        }

        /* Period tabs */
        .period-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .period-tab {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .period-tab.active {
            background: #d4a574;
            color: #000;
            border-color: #d4a574;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>Claude Usage Tracker</h1>
    <p class="subtitle"><span class="live-dot"></span>Live — updates every 5 seconds</p>

    <div class="install-box">
        <h2>Install on a friend's machine</h2>
        <code id="installCmd">curl -s http://YOUR_SERVER:5000/install | bash</code>
        <p class="hint">Click to copy. They run this once and it's done.</p>
    </div>

    <div class="stats" id="statsGrid"></div>
    <div class="members" id="membersGrid"></div>

    <div class="usage-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h2 style="margin:0; font-size:1rem; color:#ccc;">Usage Comparison</h2>
            <div class="period-tabs">
                <button class="period-tab active" data-period="today">Today</button>
                <button class="period-tab" data-period="week">This Week</button>
                <button class="period-tab" data-period="month">This Month</button>
                <button class="period-tab" data-period="all">All Time</button>
            </div>
        </div>
        <div class="bar-chart" id="barChart"></div>
    </div>

    <div class="activity">
        <h2>Recent Activity</h2>
        <div id="activityFeed"></div>
    </div>

    <!-- Rename modal -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <h3>Rename Member</h3>
            <input type="text" id="renameInput" placeholder="Friendly name...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeRename()">Cancel</button>
                <button class="btn-save" onclick="saveRename()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentData = { members: {}, sessions: [] };
        let currentPeriod = "today";
        let renameHostname = null;

        // Update install command with current URL
        const installCmd = document.getElementById("installCmd");
        installCmd.textContent = `curl -s ${window.location.origin}/install | bash`;
        installCmd.addEventListener("click", () => {
            navigator.clipboard.writeText(installCmd.textContent);
            installCmd.style.color = "#4ade80";
            setTimeout(() => installCmd.style.color = "#d4a574", 1000);
        });

        // Period tabs
        document.querySelectorAll(".period-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelector(".period-tab.active").classList.remove("active");
                tab.classList.add("active");
                currentPeriod = tab.dataset.period;
                render();
            });
        });

        function getAlias(hostname) {
            return currentData.members[hostname]?.alias || hostname;
        }

        function isActive(hostname) {
            return currentData.sessions.some(s => s.hostname === hostname && s.end === null);
        }

        function filterSessions(period) {
            const now = new Date();
            return currentData.sessions.filter(s => {
                if (period === "all") return true;
                const start = new Date(s.start);
                if (period === "today") {
                    return start.toDateString() === now.toDateString();
                } else if (period === "week") {
                    const weekAgo = new Date(now);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    return start >= weekAgo;
                } else if (period === "month") {
                    return start.getMonth() === now.getMonth() && start.getFullYear() === now.getFullYear();
                }
                return true;
            });
        }

        function sessionMinutes(session) {
            const start = new Date(session.start);
            const end = session.end ? new Date(session.end) : new Date();
            return Math.max(1, Math.round((end - start) / 60000));
        }

        function formatDuration(mins) {
            if (mins < 60) return `${mins}m`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return "just now";
            if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
            return d.toLocaleDateString();
        }

        function render() {
            const hostnames = Object.keys(currentData.members);
            const sessions = filterSessions(currentPeriod);

            // Stats
            const totalSessions = sessions.length;
            const totalMins = sessions.reduce((sum, s) => sum + sessionMinutes(s), 0);
            const activeCount = hostnames.filter(h => isActive(h)).length;

            document.getElementById("statsGrid").innerHTML = `
                <div class="stat-card">
                    <div class="label">Total Sessions (${currentPeriod})</div>
                    <div class="value">${totalSessions}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Time</div>
                    <div class="value">${formatDuration(totalMins)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Active Now</div>
                    <div class="value">${activeCount}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Members</div>
                    <div class="value">${hostnames.length}</div>
                </div>
            `;

            // Member cards
            if (hostnames.length === 0) {
                document.getElementById("membersGrid").innerHTML = `
                    <div class="empty-state">No members yet. Share the install command above.</div>
                `;
            } else {
                document.getElementById("membersGrid").innerHTML = hostnames.map(h => {
                    const active = isActive(h);
                    const memberSessions = sessions.filter(s => s.hostname === h);
                    const memberMins = memberSessions.reduce((sum, s) => sum + sessionMinutes(s), 0);
                    const lastSession = currentData.sessions.filter(s => s.hostname === h).slice(-1)[0];
                    return `
                        <div class="member-card ${active ? 'active' : ''}">
                            <div class="member-header">
                                <span class="member-name" onclick="openRename('${h}')">${getAlias(h)}</span>
                                <span class="member-status ${active ? 'online' : 'offline'}">${active ? 'Active' : 'Offline'}</span>
                            </div>
                            <div class="member-stats">
                                <div class="member-stat">
                                    <div class="num">${memberSessions.length}</div>
                                    <div class="lbl">Sessions</div>
                                </div>
                                <div class="member-stat">
                                    <div class="num">${formatDuration(memberMins)}</div>
                                    <div class="lbl">Time</div>
                                </div>
                                <div class="member-stat">
                                    <div class="num">${lastSession ? formatTime(lastSession.start) : '-'}</div>
                                    <div class="lbl">Last seen</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join("");
            }

            // Bar chart
            const maxMins = Math.max(1, ...hostnames.map(h =>
                sessions.filter(s => s.hostname === h).reduce((sum, s) => sum + sessionMinutes(s), 0)
            ));

            document.getElementById("barChart").innerHTML = hostnames.map((h, i) => {
                const mins = sessions.filter(s => s.hostname === h).reduce((sum, s) => sum + sessionMinutes(s), 0);
                const pct = Math.max(2, (mins / maxMins) * 100);
                return `
                    <div class="bar-row">
                        <div class="bar-label">${getAlias(h)}</div>
                        <div class="bar-track">
                            <div class="bar-fill colors-${i % 4}" style="width:${pct}%">${formatDuration(mins)}</div>
                        </div>
                    </div>
                `;
            }).join("");

            // Activity feed
            const recent = [...currentData.sessions].reverse().slice(0, 20);
            if (recent.length === 0) {
                document.getElementById("activityFeed").innerHTML = `
                    <div class="empty-state">No activity yet.</div>
                `;
            } else {
                document.getElementById("activityFeed").innerHTML = recent.map(s => {
                    const action = s.end
                        ? `ended a session (${formatDuration(sessionMinutes(s))})`
                        : `started a session`;
                    const time = formatTime(s.end || s.start);
                    return `
                        <div class="activity-item">
                            <span class="activity-time">${time}</span>
                            <span class="activity-text"><span class="activity-name">${getAlias(s.hostname)}</span> ${action}</span>
                        </div>
                    `;
                }).join("");
            }
        }

        function openRename(hostname) {
            renameHostname = hostname;
            document.getElementById("renameInput").value = getAlias(hostname);
            document.getElementById("renameModal").classList.add("show");
            document.getElementById("renameInput").focus();
        }

        function closeRename() {
            document.getElementById("renameModal").classList.remove("show");
            renameHostname = null;
        }

        async function saveRename() {
            const alias = document.getElementById("renameInput").value.trim();
            if (!alias || !renameHostname) return;
            await fetch("/api/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ hostname: renameHostname, alias }),
            });
            closeRename();
            fetchData();
        }

        document.getElementById("renameInput").addEventListener("keydown", e => {
            if (e.key === "Enter") saveRename();
            if (e.key === "Escape") closeRename();
        });

        async function fetchData() {
            try {
                const res = await fetch("/api/data");
                currentData = await res.json();
                render();
            } catch (e) {}
        }

        // Poll every 5 seconds
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
